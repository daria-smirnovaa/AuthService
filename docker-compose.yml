services:
  auth-service-postgres:
    image: postgres:15-alpine
    container_name: auth-service-postgres
    environment:
      POSTGRES_DB: auth_service_postgres
      POSTGRES_USER: daria
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  auth-service:
    build: .
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-postgres:5432/auth_service_postgres
      SPRING_DATASOURCE_USERNAME: daria
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - auth-service-postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    external: true
    driver: bridge